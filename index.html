      render();
    }

    async function loadLiveProgram(options = {}) {
      refreshData.disabled = true;
      refreshData.textContent = t('refreshing');
      try {
        const response = await fetch(API_PROGRAM_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const liveData = await response.json();
        if (!liveData || !Array.isArray(liveData.events) || !Array.isArray(liveData.days) || !Array.isArray(liveData.spaces)) {
          throw new Error('Invalid public program payload');
        }
        applyProgramData(liveData, 'live', null, options);
      } catch (error) {
        console.warn('Using embedded program snapshot because live API failed:', error);
      } finally {
        refreshData.disabled = false;
        refreshData.textContent = t('updated');
        window.setTimeout(() => {
          refreshData.textContent = t('refresh');
        }, 1400);
      }
    }

    function formatSlot(value) {
      const hour = Math.floor(value / 60);
      const minute = value % 60;
      return String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0');
    }

    function rowStart(event) {
      const [h, m] = event.start.split(':').map(Number);
      return 2 + Math.max(0, Math.floor(((h * 60 + (m || 0)) - startHour * 60) / 30));
    }

    function rowSpan(event) {
      const [sh, sm] = event.start.split(':').map(Number);
      const [eh, em] = event.end.split(':').map(Number);
      const start = sh * 60 + (sm || 0);
      let end = eh * 60 + (em || 0);
      if (end === 0 && event.end === '00:00') end = 24 * 60;
      return Math.max(1, Math.ceil((end - start) / 30));
    }

    function eventMatches(event) {
      const query = state.query.trim().toLowerCase();
      if (!state.tracks.has(event.track)) return false;
      if (!state.spaces.has(event.space)) return false;
      if (state.activeDate !== 'all' && event.date !== state.activeDate) return false;
      if (query && ![event.title, event.originalTitle, localizedTitle(event), localizedTrack(event.track), event.spaceLabel, event.host, event.description].join(' ').toLowerCase().includes(query)) return false;
      return true;
    }

    function visibleEvents() {
      return data.events.filter(eventMatches);
    }

    function eventDay(event) {
      return data.days.find((day) => day.date === event.date);
    }

    function openEventDialog(eventId) {
      const event = data.events.find((item) => item.id === eventId);
      if (!event) return;
      const day = eventDay(event);
      const track = data.tracks[event.track] || data.tracks.open;
      eventDialogTitle.textContent = localizedTitle(event);
      eventDialogMeta.innerHTML = [
        day ? esc(localizedDow(day) + ' ' + day.day + ' · ' + localizedPhase(day)) : esc(event.date),
        esc(event.start + '–' + event.end),
        esc(event.spaceLabel),
        '<span><span class="dot" style="--dot:' + esc(track.color) + ';display:inline-block;vertical-align:-1px;margin-right:5px;"></span>' + esc(localizedTrack(event.track)) + '</span>'
      ].map((item) => '<span>' + item + '</span>').join('<span>·</span>');
      const host = (event.host || '').trim();
      eventDialogHostWrap.style.display = host ? 'block' : 'none';
      eventDialogHost.textContent = host;
      eventDialogDescription.textContent = (event.description || '').trim() || t('detailsComingSoon');
      eventDialog.classList.add('is-open');
    }

    function closeEventDialog() {
      eventDialog.classList.remove('is-open');
    }

    function renderFilters() {
      trackFilters.innerHTML = Object.entries(data.tracks).map(([key, track]) => {
        return '<label class="chip"><input type="checkbox" data-filter="track" value="' + esc(key) + '" ' + (state.tracks.has(key) ? 'checked' : '') + '><span class="dot" style="--dot:' + esc(track.color) + '"></span>' + esc(localizedTrack(key)) + '</label>';
      }).join('');
      spaceFilters.innerHTML = data.spaces.map((space) => {
        return '<label class="chip"><input type="checkbox" data-filter="space" value="' + esc(space.key) + '" ' + (state.spaces.has(space.key) ? 'checked' : '') + '>' + esc(space.label) + '</label>';
      }).join('');
      document.querySelectorAll('[data-filter]').forEach((input) => {
        input.addEventListener('change', () => {
          const set = input.dataset.filter === 'track' ? state.tracks : state.spaces;
          if (input.checked) set.add(input.value);
          else set.delete(input.value);
          render();
        });
      });
    }

    function renderDays() {
      const allCount = data.events.filter(event => state.tracks.has(event.track) && state.spaces.has(event.space)).length;
      dayTabs.innerHTML = '<button class="day-tab ' + (state.activeDate === 'all' ? 'is-active' : '') + '" data-date="all"><strong>' + esc(t('all')) + '</strong><span>' + esc(countLabel(allCount)) + '</span></button>' +
        data.days.map((day) => {
          const count = data.events.filter((event) => event.date === day.date && state.tracks.has(event.track) && state.spaces.has(event.space)).length;
          return '<button class="day-tab ' + (state.activeDate === day.date ? 'is-active' : '') + '" data-date="' + esc(day.date) + '"><strong>' + esc(localizedDow(day)) + ' ' + esc(day.day) + '</strong><span>' + esc(localizedPhase(day)) + ' · ' + count + '</span></button>';
        }).join('');
      dayTabs.querySelectorAll('[data-date]').forEach((button) => {
        button.addEventListener('click', () => {
          state.activeDate = button.dataset.date;
          render();
        });
      });
    }

    function renderBoard() {
      const daysToRender = state.activeDate === 'all' ? data.days : data.days.filter((day) => day.date === state.activeDate);
      if (state.activeDate === 'all') {
        boardWrap.style.display = 'none';
        return;
      }
      boardWrap.style.display = state.view === 'grid' ? 'block' : 'none';
      board.style.gridTemplateColumns = '46px repeat(' + data.spaces.length + ', minmax(118px, 1fr))';
      board.style.minWidth = Math.max(1320, 46 + data.spaces.length * 142) + 'px';
      const cells = [];
      cells.push('<div class="corner" style="grid-column:1;grid-row:1;"></div>');
      data.spaces.forEach((space, index) => {
        cells.push('<button type="button" class="space-head" data-space-key="' + esc(space.key) + '" style="grid-column:' + (index + 2) + ';grid-row:1;"><strong>' + esc(space.label) + '</strong><span class="space-head-hint">' + esc(t('spaceHint')) + '</span></button>');
      });
      slots.forEach((slot, rowIndex) => {
        const time = formatSlot(slot);
        cells.push('<div class="time" style="grid-column:1;grid-row:' + (rowIndex + 2) + ';">' + (slot % 60 === 0 ? esc(time) : '') + '</div>');
        data.spaces.forEach((space, columnIndex) => {
          cells.push('<div class="cell ' + (slot % 60 === 0 ? 'hour' : '') + '" style="grid-column:' + (columnIndex + 2) + ';grid-row:' + (rowIndex + 2) + ';"></div>');
        });
      });
      visibleEvents().filter((event) => event.date === daysToRender[0]?.date).forEach((event) => {
        const column = data.spaces.findIndex((space) => space.key === event.space) + 2;
        if (column < 2) return;
        const track = data.tracks[event.track] || data.tracks.open;
        cells.push('<article class="event" tabindex="0" role="button" data-event-id="' + esc(event.id) + '" style="--track:' + esc(track.color) + ';grid-column:' + column + ';grid-row:' + rowStart(event) + ' / span ' + rowSpan(event) + ';">' +
          '<div class="event-time">' + esc(event.start) + '–' + esc(event.end) + '</div>' +
          '<div class="event-title">' + esc(localizedTitle(event)) + '</div>' +
          '<div class="event-meta"><span class="dot" style="--dot:' + esc(track.color) + '"></span>' + esc(localizedTrack(event.track)) + '</div>' +
        '</article>');
      });
      board.innerHTML = cells.join('');
      wireSpaceOpeners(board);
      wireEventOpeners(board);
    }

    function openSpaceDialog(spaceKey) {
      const space = data.spaces.find((item) => item.key === spaceKey);
      if (!space) return;
      spaceDialogTitle.textContent = space.label;
      spaceDialogDescription.textContent = String(space.note || '').trim() || t('detailsComingSoon');
      spaceDialog.classList.add('is-open');
    }

    function closeSpaceDialog() {
      spaceDialog.classList.remove('is-open');
    }

    function wireSpaceOpeners(root) {
      root.querySelectorAll('[data-space-key]').forEach((element) => {
        element.addEventListener('click', () => openSpaceDialog(element.dataset.spaceKey));
      });
    }

    function renderList() {
      listWrap.style.display = state.view === 'list' || state.activeDate === 'all' ? 'block' : 'none';
      const events = visibleEvents();
      if (!events.length) {
        listWrap.innerHTML = '<div class="empty">No events match the current filters.</div>';
        return;
      }
      const daysToRender = state.activeDate === 'all' ? data.days : data.days.filter((day) => day.date === state.activeDate);
      listWrap.innerHTML = daysToRender.map((day) => {
        const dayEvents = events.filter((event) => event.date === day.date);
        if (!dayEvents.length) return '';
        return '<section class="day-block"><h2 class="day-heading">' + esc(localizedDow(day)) + ' ' + esc(day.day) + ' · ' + esc(localizedPhase(day)) + '</h2>' +
          dayEvents.map((event) => {
            const track = data.tracks[event.track] || data.tracks.open;
            return '<article class="list-event" tabindex="0" role="button" data-event-id="' + esc(event.id) + '">' +
              '<div class="list-time">' + esc(event.start) + '–' + esc(event.end) + '</div>' +
              '<div><div class="list-title">' + esc(localizedTitle(event)) + '</div>' +
              '<div class="list-meta"><span>' + esc(event.spaceLabel) + '</span><span>·</span><span><span class="dot" style="--dot:' + esc(track.color) + ';display:inline-block;vertical-align:-1px;margin-right:5px;"></span>' + esc(localizedTrack(event.track)) + '</span></div></div>' +
            '</article>';
          }).join('') + '</section>';
      }).join('') || '<div class="empty">No events match the current filters.</div>';
      wireEventOpeners(listWrap);
    }

    function wireEventOpeners(root) {
      root.querySelectorAll('[data-event-id]').forEach((element) => {
        element.addEventListener('click', () => openEventDialog(element.dataset.eventId));
        element.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openEventDialog(element.dataset.eventId);
          }
        });
      });
    }

    function render() {
      applyStaticText();
      renderInfoHub();
      renderDays();
      renderBoard();
      renderList();
      document.getElementById('gridView').setAttribute('aria-pressed', state.view === 'grid');
      document.getElementById('listView').setAttribute('aria-pressed', state.view === 'list');
    }

    function renderInfoHub() {
      const topics = [{ title: faqData.introTitle, intro: true }, ...faqData.sections];
      infoHub.innerHTML = '<nav class="info-bar" aria-label="Темы о коливинге">' + topics.map((topic, index) => '<button type="button" data-info-index="' + index + '" aria-pressed="' + (state.infoSection === index) + '">' + esc(topic.title) + '</button>').join('') + '</nav>';
      infoHub.querySelectorAll('[data-info-index]').forEach((button) => {
        button.addEventListener('click', () => {
          openInfoDialog(Number(button.dataset.infoIndex));
        });
      });
    }

    function openInfoDialog(index) {
      const topics = [{ title: faqData.introTitle, intro: true }, ...faqData.sections];
      const topic = topics[index];
      if (!topic) return;
      state.infoSection = index;
      infoDialogTitle.textContent = topic.title;
      infoDialogContent.innerHTML = topic.intro
        ? '<div class="info-dialog-grid"><div class="info-intro">' + faqData.intro.map((paragraph) => '<p>' + esc(paragraph) + '</p>').join('') + '</div><dl class="faq-facts">' + faqData.facts.map(([label, value]) => '<div class="faq-fact"><dt>' + esc(label) + '</dt><dd>' + esc(value) + '</dd></div>').join('') + '</dl></div>'
        : '<div class="faq-content">' + topic.html + '</div>';
      infoDialog.classList.add('is-open');
      renderInfoHub();
    }

    function closeInfoDialog() {
      state.infoSection = null;
      infoDialog.classList.remove('is-open');
      renderInfoHub();
    }

    document.getElementById('search').addEventListener('input', (event) => {
      state.query = event.target.value;
      render();
    });
    document.getElementById('langRu').addEventListener('click', () => { state.lang = 'ru'; render(); });
    document.getElementById('langEn').addEventListener('click', () => { state.lang = 'en'; render(); });
    document.getElementById('gridView').addEventListener('click', () => { state.view = 'grid'; if (state.activeDate === 'all') state.activeDate = data.days[0]?.date || 'all'; render(); });
    document.getElementById('listView').addEventListener('click', () => { state.view = 'list'; state.activeDate = 'all'; render(); });
    document.getElementById('showAll').addEventListener('click', () => {
      state.tracks = new Set(Object.keys(data.tracks));
      state.spaces = new Set(data.spaces.map((space) => space.key));
      renderFilters();
      render();
    });
    document.getElementById('hideFood').addEventListener('click', () => {
      state.tracks.delete('food');
      renderFilters();
      render();
    });
    document.getElementById('hideKids').addEventListener('click', () => {
      state.tracks.delete('kids');
      renderFilters();
      render();
    });
    document.getElementById('hideTeens').addEventListener('click', () => {
      state.tracks.delete('teens');
      renderFilters();
      render();
    });
    refreshData.addEventListener('click', () => {
      loadLiveProgram({ preserveFilters: true });
    });
    document.getElementById('closeEventDialog').addEventListener('click', closeEventDialog);
    closeInfoDialogButton.addEventListener('click', closeInfoDialog);
    closeSpaceDialogButton.addEventListener('click', closeSpaceDialog);
    infoDialog.addEventListener('click', (event) => {
      if (event.target === infoDialog) closeInfoDialog();
    });
    eventDialog.addEventListener('click', (event) => {
      if (event.target === eventDialog) closeEventDialog();
    });
    spaceDialog.addEventListener('click', (event) => {
      if (event.target === spaceDialog) closeSpaceDialog();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeInfoDialog();
        closeSpaceDialog();
        closeEventDialog();
      }
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') loadLiveProgram({ preserveFilters: true });
    });

    applyProgramData(fallbackData, 'snapshot');
    loadLiveProgram();
  </script>
</body>
</html>
